<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Theatre Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .toggle-form { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-900">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-96">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-amber-400 font-display">TheatreFlow</h1>
                <p class="text-gray-400 mt-2">Sign in to continue</p>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-gray-300 text-sm mb-1">Email</label>
                    <input type="email" id="email" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white">
                </div>
                <div>
                    <label class="block text-gray-300 text-sm mb-1">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white">
                </div>
                <div id="loginError" class="text-red-400 text-sm hidden bg-red-400/10 p-2 rounded-lg"></div>
                <button onclick="handleLogin()" class="w-full px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-lg">
                    Sign In
                </button>
                <p class="text-center text-gray-400 text-sm">
                    Don't have an account? 
                    <button onclick="showSignup()" class="text-amber-400 hover:underline">Sign up</button>
                </p>
            </div>
            
            <!-- Signup Form (hidden initially) -->
<div id="signupForm" class="space-y-4 hidden">
    <div>
        <label class="block text-gray-300 text-sm mb-1">Full Name</label>
        <input type="text" id="fullName" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white">
    </div>
    <div>
        <label class="block text-gray-300 text-sm mb-1">Email</label>
        <input type="email" id="signupEmail" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white">
    </div>
    <div>
        <label class="block text-gray-300 text-sm mb-1">Password</label>
        <input type="password" id="signupPassword" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white">
    </div>
    <!-- Role field removed - defaulting to director -->
    <div id="signupError" class="text-red-400 text-sm hidden bg-red-400/10 p-2 rounded-lg"></div>
    <button onclick="handleSignup()" class="w-full px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-lg">
        Create Account
    </button>
    <p class="text-center text-gray-400 text-sm">
        Already have an account? 
        <button onclick="showLogin()" class="text-amber-400 hover:underline">Sign in</button>
    </p>
</div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
        <div class="bg-gray-800 p-6 rounded-lg">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-amber-600 mx-auto"></div>
            <p id="loadingMessage" class="text-white mt-4">Processing...</p>
        </div>
    </div>

    <!-- Use module script -->
    <script type="module" src="login.js"></script>
</body>
</html>
